<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <div class="container">
        <div class="signupForm">
            <form id="signupForm" onsubmit="handleFormSubmit(event)">
                <h1> SignUp</h1>
                <label for="name" style="font-weight: bold; padding-bottom: 5px; font-size: 25px;">Name:-</label>
                <input type="text" id="name" placeholder="Enter name" required>

                <label for="email" style="font-weight: bold; padding-bottom: 5px; font-size: 25px;">Email:-</label>
                <input id="email" type="email" placeholder="Enter email" required>

                <label for="phno" style="font-weight: bold; padding-bottom: 5px; font-size: 25px;">Phone:-</label>
                <input id="phno" type="number" placeholder="Enter mobile number" min="1000000000" max="9999999999" required>

                <label for="pass" style="font-weight: bold; padding-bottom: 5px; font-size: 25px;">Password:-</label>
                <input id="pass" type="password" placeholder="Create password" required>

                <button>Submit</button>
            </form>
        </div>
        <a href="login.html"><button style="margin-top: 10px; width: 100%; padding: 10px; font-size: 20px; font-weight: bold; background-color: brown;">Login</button></a>


        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script src="signup.js"></script>
    </div>
</body>
</html>

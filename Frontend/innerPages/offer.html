<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers</title>
    <link rel="stylesheet" href="offer.css">
</head>
<body>
    <div class="container">
        <header class="table-header">
            <button class="navBtn" id="backBtn">Back</button>
            <h1 style="color: white;">OFFERS</h1>
            <button class="navBtn" id="addBtn">Add</button>
        </header>

        <table class="offerTable">
            <thead>
                <tr>
                    <th> SL No</th>
                    <th>Company Name</th>
                    <th>Last Date</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody id="offerTableBody">
            </tbody>
        </table>

        <div id="pagination" class="paginationContainer">
        </div>
    </div>



    <div id="offerOverlay" class="offer-overlay">
        <div class="offer-card">
            <div class="offer-header">
                <h3>Add New Offer</h3>
                <button id="offercloseOverlay">Close</button>
            </div>
            <form class="offer-AddForm" id="offerOverlayForm">
                <div class="formItem">
                    <label>Company Name</label>
                    <input type="text" id="companyName" placeholder="e.g google" required>
                </div>

                <div class="formItem">
                    <label>Lasr Date</label>
                    <input type="date" id="lastDate" required>
                </div>
                <div class="formItem">
                    <label>Role</label>
                    <input type="text" id="role" required>
                </div>

                <button type="submit" class="submitBtn">Submit</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="offer.js"></script>
</body>
</html>

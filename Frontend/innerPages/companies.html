<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies</title>
    <link rel="stylesheet" href="companies.css">
</head>
<body>
    <div class="container">
        <header class="table-header">
            <button class="navBtn" id="backBtn">Back</button>
            <h1 style="color: white;">Company List</h1>
            <button class="navBtn" id="addBtn">Add</button>
            <div class="search">
                <input type="text" id="searchInput" placeholder="Company Name or Industry" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
            </div>
        </header>
        
        <table class="companyTable">
            <thead>
                <tr>
                    <th> SL No</th>
                    <th>Company Name</th>
                    <th>Industry</th>
                    <th>Company Size</th>
                    <th>Company Contact</th>
                </tr>
            </thead>
            <tbody id="companyTableBody">
            </tbody>
        </table>

        <div id="pagination" class="paginationContainer">
        </div>
    </div>



    <div id="companyOverlay" class="company-overlay">
        <div class="company-card">
            <div class="company-header">
                <h3>Add New Company</h3>
                <button id="companycloseOverlay">Close</button>
            </div>
            <form class="company-AddForm" id="companyOverlayForm">
                <div class="formItem">
                    <label>Company Name</label>
                    <input type="text" id="companyName" placeholder="e.g google" required>
                </div>

                <div class="formItem">
                    <label>Industry</label>
                    <input type="text" id="industry" placeholder="e.g IT" required>
                </div>
                <div class="formItem">
                    <label>Company Size</label>
                    <input type="number" id="companySize" required>
                </div>

                <div class="formItem">
                    <label>Company Contact</label>
                    <input type="text" id="companyContact" required>
                </div>

                <button type="submit" class="submitBtn">Submit</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="companies.js"></script>
</body>
</html>
